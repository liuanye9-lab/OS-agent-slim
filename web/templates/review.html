<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StableAgent Cloud — Human Review</title>
<link rel="stylesheet" href="/static/styles_v2.css"><link rel="stylesheet" href="/static/liquid_glass.css">
</head>
<body class="liquid-bg">
<div style="max-width:1000px;margin:0 auto;padding:20px;">
  <div class="glass-card" style="padding:12px 20px;margin-bottom:16px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
    <a href="/" style="font-weight:700;font-size:1.1rem;text-decoration:none;color:var(--text-primary);">☁️ StableAgent Cloud</a>
    <span style="flex:1;"></span>
    <a href="/dashboard/v3" class="btn-glass" style="text-decoration:none;padding:6px 14px;">📊 Dashboard</a>
    <a href="/dashboard/skills" class="btn-glass" style="text-decoration:none;padding:6px 14px;">🧠 Skills</a>
    <a href="/dashboard/review" class="btn-glass" style="text-decoration:none;padding:6px 14px;background:var(--accent);color:#fff;">✅ 审核</a>
    <select id="ws-selector" onchange="loadReviews()" style="padding:6px 12px;border-radius:8px;background:var(--glass-bg);border:1px solid var(--glass-border);color:var(--text-primary);"><option value="">选择工作空间</option></select>
  </div>

  <div class="glass-card" style="padding:16px;margin-bottom:12px;">
    <div style="font-weight:600;margin-bottom:8px;">⏳ 待审核队列</div>
    <div id="review-list"></div>
  </div>

  <!-- Patch Diff viewer -->
  <div class="glass-card" style="padding:16px;display:none;" id="diff-panel">
    <div style="font-weight:600;margin-bottom:8px;">📝 Patch Diff</div>
    <pre id="diff-content" style="font-family:monospace;font-size:0.85rem;white-space:pre-wrap;background:rgba(0,0,0,0.05);padding:12px;border-radius:8px;max-height:300px;overflow-y:auto;"></pre>
  </div>
</div>

<script>
let _currentWsId = '';
async function loadWorkspaces() {
  const r = await fetch('/api/workspaces'); const d = await r.json();
  const sel = document.getElementById('ws-selector');
  (d.workspaces||[]).forEach(w => sel.innerHTML += `<option value="${w.id}">${w.name}</option>`);
}
async function loadReviews() {
  _currentWsId = document.getElementById('ws-selector').value;
  if (!_currentWsId) return;
  const r = await fetch('/api/reviews?workspace_id=' + _currentWsId);
  const d = await r.json();
  const reviews = d.reviews || [];
  let html = '';
  if (!reviews.length) {
    html = '<div style="color:var(--text-muted);text-align:center;padding:20px;">暂无待审核内容 ✅</div>';
  }
  reviews.forEach(rev => {
    html += `<div class="glass-card" style="padding:12px;margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
        <div>
          <div style="font-weight:600;">${rev.target_type}: ${rev.target_id.slice(0,14)}...</div>
          <div style="font-size:0.8rem;color:var(--text-muted);">${rev.status} | ${rev.reviewer||'未指派'}</div>
        </div>
        <div style="display:flex;gap:6px;">`;
    if (rev.status === 'pending') {
      html += `<button onclick="approve('${rev.id}')" class="btn-glass" style="padding:6px 12px;background:#22c55e;color:#fff;">✅ 批准</button>
               <button onclick="rejectReview('${rev.id}')" class="btn-glass" style="padding:6px 12px;background:#ef4444;color:#fff;">❌ 拒绝</button>`;
    }
    if (rev.patch_diff) {
      html += `<button onclick="showDiff('${rev.target_id}')" class="btn-glass" style="padding:6px 12px;">📝 Diff</button>`;
    }
    html += `</div></div></div>`;
  });
  document.getElementById('review-list').innerHTML = html;
}
async function approve(id) {
  await fetch('/api/reviews/' + id, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'approve',reviewer:'admin'})});
  loadReviews();
}
async function rejectReview(id) {
  await fetch('/api/reviews/' + id, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'reject',reviewer:'admin'})});
  loadReviews();
}
async function showDiff(patchId) {
  const panel = document.getElementById('diff-panel');
  panel.style.display = 'block';
  document.getElementById('diff-content').textContent = 'Loading diff for patch: ' + patchId + '...';
}
loadWorkspaces();
</script>
</body>
</html>
