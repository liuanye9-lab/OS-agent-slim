<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StableAgent OS — Dashboard V3</title>
<link rel="stylesheet" href="/static/styles_v2.css">
<link rel="stylesheet" href="/static/liquid_glass.css">
</head>
<body class="liquid-bg">
<div class="sparkle-layer"></div>
<div class="dashboard-v3">
  <!-- SaaS v1.2: 工作空间/项目选择器 -->
  <div class="glass-card saas-nav">
    <span style="font-weight:700;font-size:0.9rem;letter-spacing:-0.3px;">☁️ SaaS</span>
    <select id="ws-selector" onchange="loadProjects()">
      <option value="">选择工作空间</option>
    </select>
    <select id="proj-selector" onchange="selectProject()">
      <option value="">选择项目</option>
    </select>
    <span id="saas-info" style="font-size:0.8rem;color:var(--text-tertiary);font-family:var(--font-mono);"></span>
  </div>

  <!-- 顶部栏 -->
  <div class="glass-card dash-top-bar">
    <div style="display:flex;align-items:center;gap:16px;">
      <span class="brand-title">StableAgent OS</span>
      <span class="status-badge online" id="conn-status"><span class="dot"></span><span class="status-text">已连接</span></span>
    </div>
    <div style="display:flex;align-items:center;gap:14px;">
      <span id="run-id-display" style="font-size:0.82rem;color:var(--text-tertiary);font-family:var(--font-mono);">run_id: —</span>
      <button class="btn-glass" id="lang-toggle" onclick="window.i18n.setLocale(window.i18n.locale==='zh'?'en':'zh')" data-i18n="lang_switch">EN</button>
      <span class="current-pct" id="current-pct">0%</span>
    </div>
  </div>

  <!-- 左侧：像素人场景 -->
  <div class="glass-card dash-left">
    <div class="avatar-scene" id="avatar-scene">
      <div class="avatar-prop" id="avatar-prop">⏳</div>
      <div class="avatar-label" id="avatar-label">等待任务</div>
      <div class="avatar-label-en" id="avatar-label-en">Awaiting task</div>
    </div>
  </div>

  <!-- 中间：决策卡片 + 进度条 -->
  <div class="dash-center">
    <div class="glass-card progress-card" id="progress-card">
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-pct" id="progress-pct">0%</div>
      <div class="stage-label" id="stage-label">等待任务...</div>
      <div class="stage-desc" id="stage-desc">输入 /os-agent 你的任务来开始</div>
    </div>
    <div id="decision-panel"></div>
  </div>

  <!-- 右侧：时间线 + 学习面板 -->
  <div class="dash-right">
    <div class="glass-card timeline-panel" id="timeline-panel">
      <h4>决策时间线</h4>
      <div class="timeline-list" id="timeline-list"><span class="timeline-empty">等待事件...</span></div>
    </div>
    <div class="glass-card learning-panel" id="learning-panel">
      <h4>自我优化</h4>
      <div id="learning-status">
        <span class="timeline-empty">等待任务完成...</span>
      </div>
    </div>
  </div>

  <!-- 底部：指标 + 反馈 -->
  <div class="dash-bottom">
    <div class="glass-card">
      <div class="metric-label">Token ROI</div>
      <div class="metric-value" id="metric-roi">—</div>
    </div>
    <div class="glass-card">
      <div class="metric-label">质量分</div>
      <div class="metric-value" id="metric-quality">—</div>
    </div>
    <div class="glass-card">
      <div class="metric-label">意图对齐</div>
      <div class="metric-value" id="metric-intent">—</div>
    </div>
    <div class="glass-card">
      <div class="metric-label">记忆命中</div>
      <div class="metric-value" id="metric-memory">—</div>
    </div>
    <div class="glass-card feedback-section" id="feedback-section" style="display:none;">
      <div class="feedback-title" id="feedback-title">任务完成，你觉得怎么样？</div>
      <div class="feedback-buttons" id="feedback-btns"></div>
    </div>
  </div>

  <!-- SaaS v1.3: Run 详情面板 -->
  <div id="run-detail-panel"></div>
</div>

<script src="/static/i18n.js"></script>
<script>
// SaaS v1.2: 项目选择器
let _saasWsId = '', _saasProjId = '';

async function loadWorkspaces() {
  try {
    const r = await fetch('/api/workspaces');
    const data = await r.json();
    const sel = document.getElementById('ws-selector');
    // 保留第一个 option
    sel.innerHTML = '<option value="">选择工作空间</option>';
    (data.workspaces||[]).forEach(w => {
      sel.innerHTML += `<option value="${w.id}">${w.name} (${w.tier})</option>`;
    });
  } catch(e) { console.warn('loadWorkspaces:', e); }
}

async function loadProjects() {
  const wsId = document.getElementById('ws-selector').value;
  _saasWsId = wsId;
  if (!wsId) return;
  try {
    const r = await fetch('/api/projects?workspace_id=' + wsId);
    const data = await r.json();
    const sel = document.getElementById('proj-selector');
    sel.innerHTML = '<option value="">选择项目</option>';
    (data.projects||[]).forEach(p => {
      sel.innerHTML += `<option value="${p.id}">${p.name}</option>`;
    });
    document.getElementById('saas-info').textContent = `WS: ${wsId.slice(0,12)}...`;
  } catch(e) { console.warn('loadProjects:', e); }
}

function selectProject() {
  _saasProjId = document.getElementById('proj-selector').value;
  if (_saasProjId) {
    document.getElementById('saas-info').textContent =
      `WS: ${_saasWsId.slice(0,12)}... | Proj: ${_saasProjId.slice(0,12)}...`;
  }
}

// 页面加载时自动加载工作空间列表
loadWorkspaces();
</script>
<script src="/static/dashboard_run_detail.js"></script>
<script src="/static/dashboard_v3.js"></script>
</body>
</html>
