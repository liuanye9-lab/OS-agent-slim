<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StableAgent OS — Dashboard V3</title>
<link rel="stylesheet" href="/static/styles_v2.css">
<link rel="stylesheet" href="/static/liquid_glass.css">
</head>
<body class="liquid-bg">
<div class="dashboard-v3">
  <!-- SaaS v1.2: 工作空间/项目选择器 -->
  <div class="glass-card saas-nav" style="margin-bottom:12px;padding:10px 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
    <span style="font-weight:600;font-size:0.85rem;">☁️ SaaS</span>
    <select id="ws-selector" onchange="loadProjects()" style="padding:6px 10px;border-radius:8px;background:var(--glass-bg);border:1px solid var(--glass-border);color:var(--text-primary);">
      <option value="">选择工作空间</option>
    </select>
    <select id="proj-selector" onchange="selectProject()" style="padding:6px 10px;border-radius:8px;background:var(--glass-bg);border:1px solid var(--glass-border);color:var(--text-primary);">
      <option value="">选择项目</option>
    </select>
    <span id="saas-info" style="font-size:0.8rem;color:var(--text-muted);"></span>
  </div>
  <!-- 顶部栏 -->
  <div class="glass-card dash-top-bar">
    <div style="display:flex;align-items:center;gap:16px;">
      <span style="font-size:1.3rem;font-weight:700;">StableAgent OS</span>
      <span class="status-badge online" id="conn-status">● 已连接</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span id="run-id-display" style="font-size:0.85rem;color:var(--text-muted);">run_id: —</span>
      <button class="btn-glass" id="lang-toggle" onclick="window.i18n.setLocale(window.i18n.locale==='zh'?'en':'zh')" data-i18n="lang_switch">EN</button>
      <span id="current-pct" style="font-weight:700;color:var(--accent);">0%</span>
    </div>
  </div>

  <!-- 左侧：像素人场景 -->
  <div class="glass-card dash-left" style="padding:0;overflow:hidden;">
    <div class="avatar-scene" id="avatar-scene">
      <div class="avatar-prop" id="avatar-prop">⏳</div>
      <div class="avatar-label" id="avatar-label">等待任务</div>
      <div class="avatar-label-en" id="avatar-label-en">Awaiting task</div>
    </div>
  </div>

  <!-- 中间：决策卡片 + 进度条 -->
  <div class="dash-center">
    <div class="glass-card" style="padding:20px 24px;" id="progress-card">
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-pct" id="progress-pct">0%</div>
      <div class="stage-label" id="stage-label">等待任务...</div>
      <div class="stage-desc" id="stage-desc">输入 /os-agent 你的任务来开始</div>
    </div>
    <div id="decision-panel"></div>
  </div>

  <!-- 右侧：时间线 + 学习面板 -->
  <div class="dash-right">
    <div class="glass-card" style="padding:16px 20px;max-height:400px;overflow-y:auto;" id="timeline-panel">
      <h4 style="margin:0 0 12px;color:var(--text-muted);">决策时间线</h4>
      <div id="timeline-list"><span style="color:var(--text-muted);">等待事件...</span></div>
    </div>
    <div class="glass-card" style="padding:16px 20px;" id="learning-panel">
      <h4 style="margin:0 0 12px;color:var(--text-muted);">自我优化</h4>
      <div id="learning-status">
        <span style="color:var(--text-muted);">等待任务完成...</span>
      </div>
    </div>
  </div>

  <!-- 底部：指标 + 反馈 -->
  <div class="dash-bottom" style="display:flex;gap:16px;flex-wrap:wrap;">
    <div class="glass-card" style="flex:1;min-width:160px;padding:12px 16px;text-align:center;">
      <div style="font-size:0.8rem;color:var(--text-muted);">Token ROI</div>
      <div style="font-size:1.2rem;font-weight:700;" id="metric-roi">—</div>
    </div>
    <div class="glass-card" style="flex:1;min-width:160px;padding:12px 16px;text-align:center;">
      <div style="font-size:0.8rem;color:var(--text-muted);">质量分</div>
      <div style="font-size:1.2rem;font-weight:700;" id="metric-quality">—</div>
    </div>
    <div class="glass-card" style="flex:1;min-width:160px;padding:12px 16px;text-align:center;">
      <div style="font-size:0.8rem;color:var(--text-muted);">意图对齐</div>
      <div style="font-size:1.2rem;font-weight:700;" id="metric-intent">—</div>
    </div>
    <div class="glass-card" style="flex:1;min-width:160px;padding:12px 16px;text-align:center;">
      <div style="font-size:0.8rem;color:var(--text-muted);">记忆命中</div>
      <div style="font-size:1.2rem;font-weight:700;" id="metric-memory">—</div>
    </div>
    <div class="glass-card" style="flex:1;min-width:200px;padding:12px 16px;text-align:center;" id="feedback-section" style="display:none;">
      <div style="font-size:0.85rem;" id="feedback-title">任务完成，你觉得怎么样？</div>
      <div class="feedback-buttons" id="feedback-btns"></div>
    </div>
  </div>
</div>

<script src="/static/i18n.js"></script>
<script>
// SaaS v1.2: 项目选择器
let _saasWsId = '', _saasProjId = '';

async function loadWorkspaces() {
  try {
    const r = await fetch('/api/workspaces');
    const data = await r.json();
    const sel = document.getElementById('ws-selector');
    // 保留第一个 option
    sel.innerHTML = '<option value="">选择工作空间</option>';
    (data.workspaces||[]).forEach(w => {
      sel.innerHTML += `<option value="${w.id}">${w.name} (${w.tier})</option>`;
    });
  } catch(e) { console.warn('loadWorkspaces:', e); }
}

async function loadProjects() {
  const wsId = document.getElementById('ws-selector').value;
  _saasWsId = wsId;
  if (!wsId) return;
  try {
    const r = await fetch('/api/projects?workspace_id=' + wsId);
    const data = await r.json();
    const sel = document.getElementById('proj-selector');
    sel.innerHTML = '<option value="">选择项目</option>';
    (data.projects||[]).forEach(p => {
      sel.innerHTML += `<option value="${p.id}">${p.name}</option>`;
    });
    document.getElementById('saas-info').textContent = `WS: ${wsId.slice(0,12)}...`;
  } catch(e) { console.warn('loadProjects:', e); }
}

function selectProject() {
  _saasProjId = document.getElementById('proj-selector').value;
  if (_saasProjId) {
    document.getElementById('saas-info').textContent =
      `WS: ${_saasWsId.slice(0,12)}... | Proj: ${_saasProjId.slice(0,12)}...`;
  }
}

// 页面加载时自动加载工作空间列表
loadWorkspaces();
</script>
<script src="/static/dashboard_v3.js"></script>
</body>
</html>
